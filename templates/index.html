<!DOCTYPE html>
<html>
<head>
    <title>MediPredict</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:#fff;
            width:700px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0077b6;
            margin-bottom:20px;
        }

        .tabs{
            display:flex;
            margin-bottom:20px;
        }

        .tab{
            flex:1;
            padding:12px;
            border:none;
            background:#caf0f8;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        .active{
            background:#0077b6;
            color:white;
        }

        .form-section{
            display:none;
        }

        .show{
            display:block;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .btn{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#0077b6;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
        }

        .btn:hover{
            background:#023e8a;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            color:green;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>MediPredict</h1>

    <div class="tabs">
        <button class="tab active" onclick="showForm('kidney', event)">
            Kidney Disease
        </button>

        <button class="tab" onclick="showForm('mental', event)">
            Mental Health
        </button>
    </div>

    <!-- Kidney Form -->
    <div id="kidney" class="form-section show">

        <form action="/predict_kidney" method="post">

            <label>Age</label>
            <input type="number" name="age" required>

            <label>Blood Pressure</label>
            <input type="number" name="bp" required>

            <label>Specific Gravity</label>
            <input type="number" step="0.001" name="sg" required>

            <label>Albumin</label>
            <input type="number" name="al" required>

            <label>Sugar</label>
            <input type="number" name="su" required>

            <input type="submit" value="Predict Kidney Risk" class="btn">

        </form>

        <div class="result">
            {{ kidney_prediction if kidney_prediction else "" }}
        </div>

    </div>

    <!-- Mental Health Form -->
    <div id="mental" class="form-section">

        <form action="/predict_mental" method="post">

            <label>Age</label>
            <input type="number" name="mental_age" required>

            <label>Stress Level (1-10)</label>
            <input type="number" name="stress" required>

            <label>Sleep Hours</label>
            <input type="number" step="0.1" name="sleep" required>

            <label>Work Pressure (1-10)</label>
            <input type="number" name="work" required>

            <input type="submit" value="Predict Mental Health Risk" class="btn">

        </form>

        <div class="result">
            {{ mental_prediction if mental_prediction else "" }}
        </div>

    </div>

</div>

<script>
function showForm(formId, event){

    let sections = document.querySelectorAll('.form-section');

    sections.forEach(section => {
        section.classList.remove('show');
    });

    document.getElementById(formId).classList.add('show');

    let tabs = document.querySelectorAll('.tab');

    tabs.forEach(tab => {
        tab.classList.remove('active');
    });

    event.target.classList.add('active');
}
</script>

</body>
</html>
